<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — GSN Global Success Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/topnav.css" />
  <link rel="stylesheet" href="../css/pages.css" />
</head>
<body>
  <div id="gsn-topnav" data-base="pages" data-current="contact"></div>

  <main>
    <!-- ── HERO ── -->
    <section class="page-hero">
      <div class="wrap">
        <div class="kicker">Get Invited</div>
        <h1>Request Your<br><em>Complimentary Visit</em></h1>
        <p>Experience the GSN difference at a local chapter meeting. First-time visitors attend free — no obligation, no pressure. See the world's most structured referral network in action.</p>
      </div>
    </section>

    <!-- ── FORM SECTION ── -->
    <section class="page-content">
      <div class="wrap">
        <div class="contact-form-wrap">
          <form class="contact-form" action="#" method="post" onsubmit="event.preventDefault(); alert('Thank you! A GSN representative will contact you shortly to schedule your complimentary chapter visit.');">
            <div>
              <label for="name">Full Name</label>
              <input id="name" name="name" type="text" required placeholder="Your name" />
            </div>
            <div>
              <label for="email">Email</label>
              <input id="email" name="email" type="email" required placeholder="you@company.com" />
            </div>
            <div>
              <label for="phone">Phone Number</label>
              <input id="phone" name="phone" type="tel" placeholder="+91 98765 43210" />
            </div>
            <div>
              <label for="city">City</label>
              <input id="city" name="city" type="text" required placeholder="Mumbai, Dubai, New York…" />
            </div>
            <div>
              <label for="industry">Industry / Category</label>
              <select id="industry" name="industry" required>
                <option value="">Select your category</option>
                <option>Accounting &amp; Finance</option>
                <option>Legal Services</option>
                <option>Real Estate</option>
                <option>Healthcare</option>
                <option>Technology</option>
                <option>Marketing &amp; Creative</option>
                <option>Consulting</option>
                <option>Manufacturing</option>
                <option>Education</option>
                <option>Other</option>
              </select>
            </div>
            <div>
              <label for="message">Message (optional)</label>
              <textarea id="message" name="message" rows="4" placeholder="Tell us about your business and referral goals"></textarea>
            </div>
            <button type="submit">Get Invited — It's Free</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script src="../js/topnav.js"></script>
  <script src="../js/pages.js"></script>
</body>
</html>
